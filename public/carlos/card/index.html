<style>
  :root {
    --evox-black: #0A0E14;
    --evox-deep: #040F18;
    --evox-teal: #66CBB0;
    --evox-teal-deep: #3FA88E;
    --evox-teal-soft: rgba(102, 203, 176, 0.12);
    --mist: #B8C2C9;
    --white: #FFFFFF;
    --divider: rgba(184, 194, 201, 0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--evox-deep);
    color: var(--white);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient teal glow — subtle, refined */
  body::before {
    content: "";
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vw;
    max-width: 700px;
    max-height: 500px;
    background: radial-gradient(closest-side, rgba(102, 203, 176, 0.18), transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: linear-gradient(180deg, var(--evox-black) 0%, #0B1218 100%);
    border: 1px solid var(--divider);
    border-radius: 24px;
    padding: 36px 28px 28px;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(102, 203, 176, 0.06) inset;
    z-index: 1;
  }

  .logo {
    display: block;
    width: 180px;
    max-width: 60%;
    height: auto;
    margin: 0 auto 28px;
  }

  .identity {
    text-align: center;
    margin-bottom: 28px;
  }

  .name {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
    color: var(--white);
  }

  .title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--evox-teal);
    margin: 0 0 4px;
  }

  .company {
    font-size: 13px;
    color: var(--mist);
    margin: 0;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid var(--divider);
    background: rgba(255, 255, 255, 0.02);
    color: var(--white);
    text-decoration: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.05s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover {
    background: rgba(102, 203, 176, 0.06);
    border-color: rgba(102, 203, 176, 0.35);
  }

  .btn:active { transform: scale(0.99); }

  .btn .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--evox-teal);
  }

  .btn .label {
    flex: 1;
    text-align: left;
  }

  .btn .sublabel {
    font-size: 12px;
    color: var(--mist);
    font-weight: 400;
  }

  .btn-primary {
    background: var(--evox-teal);
    border-color: var(--evox-teal);
    color: var(--evox-black);
    font-weight: 600;
    justify-content: center;
  }

  .btn-primary .icon { color: var(--evox-black); }

  .btn-primary:hover {
    background: var(--evox-teal-deep);
    border-color: var(--evox-teal-deep);
  }

  .divider {
    height: 1px;
    background: var(--divider);
    margin: 24px 0 20px;
  }

  .qr-section {
    text-align: center;
  }

  .qr-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    margin: 0 0 12px;
  }

  .qr {
    display: inline-block;
    width: 132px;
    height: 132px;
    padding: 10px;
    background: var(--white);
    border-radius: 12px;
    color: var(--evox-black);
  }

  .qr svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--mist);
    opacity: 0.7;
  }

  .footer a { color: inherit; text-decoration: none; }

  @media (max-width: 380px) {
    .card { padding: 28px 20px 22px; border-radius: 20px; }
    .name { font-size: 24px; }
    .logo { margin-bottom: 22px; }
  }
</style>
</head>
