<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1DAA6C;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#1DAA6C;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1DAA6C;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative waves -->
  <path d="M 0 100 Q 300 50 600 100 T 1200 100 L 1200 0 L 0 0 Z" fill="url(#accentGradient)"/>
  <path d="M 0 630 Q 300 580 600 630 T 1200 630 L 1200 530 L 0 530 Z" fill="url(#accentGradient)"/>

  <!-- EVOX Logo Text -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#1DAA6C" text-anchor="middle">
    EVOX
  </text>

  <!-- LLC -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="300" fill="#94a3b8" text-anchor="middle">
    LLC
  </text>

  <!-- Tagline -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="42" font-weight="600" fill="#e2e8f0" text-anchor="middle">
    Business Process Automation
  </text>

  <!-- Description -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Python • n8n • AI Solutions
  </text>

  <!-- Decorative line -->
  <line x1="400" y1="460" x2="800" y2="460" stroke="#1DAA6C" stroke-width="3" stroke-linecap="round"/>

  <!-- Website -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#64748b" text-anchor="middle">
    evoxautomation.cloud
  </text>
</svg>
